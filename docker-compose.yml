version: "3.9"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: change_this_to_a_secure_random_key
      JWT_EXPIRE: 7d
      WEBHOOK_SECRET: change_this_to_a_secure_webhook_secret
      PRODUCTION_BASE_URL: http://localhost:5000
